<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Live STT — Admin</title>
  <link rel="stylesheet" href="/static/tailwind.css">
  <style>
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #0f0f13;
      color: #e2e2e8;
    }
    table { border-collapse: collapse; width: 100%; }
    th { text-align: left; font-weight: 600; padding: 8px 12px; border-bottom: 1px solid rgba(255,255,255,0.1); }
    td { padding: 8px 12px; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .btn {
      padding: 4px 12px;
      border-radius: 6px;
      font-size: 0.75rem;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-primary { background: #6366f1; color: #fff; }
    .btn-primary:hover { background: #4f46e5; }
    .btn-danger { background: #dc2626; color: #fff; }
    .btn-danger:hover { background: #b91c1c; }
    .btn-secondary { background: #374151; color: #e5e7eb; }
    .btn-secondary:hover { background: #4b5563; }
    input, select {
      background: #1f2937;
      border: 1px solid rgba(255,255,255,0.1);
      color: #e2e2e8;
      border-radius: 6px;
      padding: 6px 10px;
      font-size: 0.8rem;
    }
    .section-title {
      font-size: 1rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #a5b4fc;
      margin-bottom: 12px;
    }
    .card {
      background: #1a1a24;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 24px;
    }
    .toggle {
      position: relative;
      width: 36px;
      height: 20px;
      appearance: none;
      background: #4b5563;
      border-radius: 999px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .toggle:checked { background: #22c55e; }
    .toggle::before {
      content: '';
      position: absolute;
      top: 2px;
      left: 2px;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: white;
      transition: transform 0.2s;
    }
    .toggle:checked::before { transform: translateX(16px); }
  </style>
</head>
<body class="min-h-screen">

  <!-- Header -->
  <header class="sticky top-0 z-10 flex items-center justify-between px-6 py-3 border-b border-white/[0.06] bg-[#13131a]">
    <div class="flex items-center gap-3">
      <a href="/" class="text-white/50 hover:text-white/80 text-sm">&larr; Back</a>
      <span class="font-semibold text-sm tracking-wide text-white/80">Admin</span>
    </div>
  </header>

  <main class="max-w-4xl mx-auto px-6 py-8">

    <!-- Session History -->
    <div class="card">
      <div class="section-title">Session History</div>
      <div id="sessions-loading" class="text-white/30 text-sm">Loading…</div>
      <table id="sessions-table" class="hidden">
        <thead>
          <tr>
            <th>Date</th>
            <th>Label</th>
            <th>Duration</th>
            <th>Segments</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="sessions-body"></tbody>
      </table>
      <div id="sessions-empty" class="text-white/30 text-sm hidden">No sessions recorded yet.</div>
    </div>

    <!-- Schedules -->
    <div class="card">
      <div class="section-title">Recurring Schedules</div>

      <div id="schedules-list" class="mb-4"></div>

      <details id="schedule-form-wrap" class="mt-4">
        <summary class="btn btn-secondary cursor-pointer">+ Add Schedule</summary>
        <div class="mt-3 flex flex-wrap gap-3 items-end">
          <div>
            <label class="block text-xs text-white/40 mb-1">Days</label>
            <div class="flex gap-1" id="day-checkboxes">
              <label class="text-xs"><input type="checkbox" value="0" class="mr-0.5">Sun</label>
              <label class="text-xs"><input type="checkbox" value="1" class="mr-0.5">Mon</label>
              <label class="text-xs"><input type="checkbox" value="2" class="mr-0.5">Tue</label>
              <label class="text-xs"><input type="checkbox" value="3" class="mr-0.5">Wed</label>
              <label class="text-xs"><input type="checkbox" value="4" class="mr-0.5">Thu</label>
              <label class="text-xs"><input type="checkbox" value="5" class="mr-0.5">Fri</label>
              <label class="text-xs"><input type="checkbox" value="6" class="mr-0.5">Sat</label>
            </div>
          </div>
          <div>
            <label class="block text-xs text-white/40 mb-1">Start</label>
            <input type="time" id="sched-start" value="10:30">
          </div>
          <div>
            <label class="block text-xs text-white/40 mb-1">Stop</label>
            <input type="time" id="sched-stop" value="12:00">
          </div>
          <div>
            <label class="block text-xs text-white/40 mb-1">Label template</label>
            <input type="text" id="sched-label" placeholder='Sunday Morning — {date}' style="width:220px">
          </div>
          <div>
            <label class="block text-xs text-white/40 mb-1">Stop policy</label>
            <select id="sched-policy">
              <option value="soft">Soft (silence timeout)</option>
              <option value="hard">Hard (exact time)</option>
            </select>
          </div>
          <button class="btn btn-primary" onclick="createSchedule()">Save</button>
          <span id="sched-msg" class="text-xs text-red-400"></span>
        </div>
      </details>
    </div>

  </main>

  <script>
    const DAY_NAMES = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

    // ── Sessions ──────────────────────────────────────────────────────────
    async function loadSessions() {
      try {
        const resp = await fetch('/admin/sessions');
        const sessions = await resp.json();
        const loading = document.getElementById('sessions-loading');
        const table = document.getElementById('sessions-table');
        const empty = document.getElementById('sessions-empty');
        const body = document.getElementById('sessions-body');

        loading.classList.add('hidden');
        if (sessions.length === 0) {
          empty.classList.remove('hidden');
          return;
        }
        table.classList.remove('hidden');
        body.innerHTML = '';

        for (const s of sessions) {
          const tr = document.createElement('tr');
          const started = new Date(s.started_at);
          const dateStr = started.toLocaleDateString([], { month: 'short', day: 'numeric', year: 'numeric' });
          const timeStr = started.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

          let duration = '—';
          if (s.stopped_at) {
            const secs = Math.floor((new Date(s.stopped_at) - new Date(s.started_at)) / 1000);
            const h = Math.floor(secs / 3600);
            const m = Math.floor((secs % 3600) / 60);
            duration = h > 0 ? `${h}h ${m}m` : `${m}m`;
          } else {
            duration = '<span class="text-green-400">Active</span>';
          }

          tr.innerHTML = `
            <td class="text-sm">${dateStr} ${timeStr}</td>
            <td class="text-sm text-white/60">${s.label || '—'}</td>
            <td class="text-sm">${duration}</td>
            <td class="text-sm text-white/40">${s.segment_count}</td>
            <td class="flex gap-2">
              <a href="/admin/sessions/${s.id}/export?fmt=txt" class="btn btn-secondary text-xs">TXT</a>
              <a href="/admin/sessions/${s.id}/export?fmt=pdf" class="btn btn-secondary text-xs">PDF</a>
            </td>
          `;
          body.appendChild(tr);
        }
      } catch (e) {
        document.getElementById('sessions-loading').textContent = 'Failed to load sessions.';
      }
    }

    // ── Schedules ─────────────────────────────────────────────────────────
    async function loadSchedules() {
      try {
        const resp = await fetch('/admin/schedules');
        const schedules = await resp.json();
        const container = document.getElementById('schedules-list');

        if (schedules.length === 0) {
          container.innerHTML = '<div class="text-white/30 text-sm">No schedules configured.</div>';
          return;
        }

        container.innerHTML = '';
        for (const s of schedules) {
          const days = s.day_of_week.map(d => DAY_NAMES[d]).join(', ');
          const div = document.createElement('div');
          div.className = 'flex items-center gap-4 py-2 border-b border-white/5';
          div.innerHTML = `
            <input type="checkbox" class="toggle" ${s.enabled ? 'checked' : ''}
                   onchange="toggleSchedule('${s.id}', this.checked, ${JSON.stringify(JSON.stringify(s))})">
            <div class="flex-1">
              <div class="text-sm font-medium">${days} &nbsp; ${s.start_time} – ${s.stop_time}</div>
              <div class="text-xs text-white/40">${s.label_template || 'No label'} &nbsp;·&nbsp; ${s.stop_policy} stop</div>
            </div>
            <button class="btn btn-danger text-xs" onclick="deleteSchedule('${s.id}')">Delete</button>
          `;
          container.appendChild(div);
        }
      } catch {
        document.getElementById('schedules-list').innerHTML = '<div class="text-red-400 text-sm">Failed to load.</div>';
      }
    }

    async function createSchedule() {
      const msg = document.getElementById('sched-msg');
      msg.textContent = '';

      const days = [...document.querySelectorAll('#day-checkboxes input:checked')].map(c => parseInt(c.value));
      if (days.length === 0) { msg.textContent = 'Select at least one day.'; return; }

      const body = {
        day_of_week: days,
        start_time: document.getElementById('sched-start').value,
        stop_time: document.getElementById('sched-stop').value,
        label_template: document.getElementById('sched-label').value,
        stop_policy: document.getElementById('sched-policy').value,
        enabled: true,
      };

      try {
        const resp = await fetch('/admin/schedules', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        if (!resp.ok) {
          const err = await resp.json();
          msg.textContent = err.error || 'Error';
          return;
        }
        document.getElementById('schedule-form-wrap').removeAttribute('open');
        loadSchedules();
      } catch {
        msg.textContent = 'Request failed.';
      }
    }

    async function toggleSchedule(id, enabled, schedJson) {
      const sched = JSON.parse(schedJson);
      sched.enabled = enabled;
      await fetch(`/admin/schedules/${id}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(sched),
      });
    }

    async function deleteSchedule(id) {
      if (!confirm('Delete this schedule?')) return;
      await fetch(`/admin/schedules/${id}`, { method: 'DELETE' });
      loadSchedules();
    }

    // ── Init ──────────────────────────────────────────────────────────────
    loadSessions();
    loadSchedules();
  </script>
</body>
</html>
