<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Live STT</title>
  <link rel="stylesheet" href="/static/tailwind.css">
  <style>
    :root {
      --accent: #6366f1;
      --accent-dim: #4f46e5;
      --transcript-font-size: 14px;
    }

    html, body {
      height: 100%;
      margin: 0;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #0f0f13;
      color: #e2e2e8;
      overflow: hidden;
    }

    main {
      min-height: 0;
    }

    #transcript-container {
      min-height: 0;
    }

    #transcript-container::-webkit-scrollbar { width: 4px; }
    #transcript-container::-webkit-scrollbar-track { background: transparent; }
    #transcript-container::-webkit-scrollbar-thumb { background: #3f3f50; border-radius: 4px; }

    .line-enter {
      animation: fadeSlideIn 0.25s ease forwards;
    }

    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .speaker-badge {
      display: inline-block;
      padding: 1px 8px;
      border-radius: 999px;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-right: 6px;
      vertical-align: middle;
      opacity: 0.9;
    }

    .dot-pulse {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      animation: pulse 1.4s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.4; transform: scale(0.7); }
    }

    .transcript-text {
      font-size: var(--transcript-font-size);
    }

    /* Session status bar */
    #session-bar {
      position: sticky;
      top: 49px; /* below header */
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 6px 24px;
      background: #0c0c10;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      font-size: 0.75rem;
    }

    #session-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    #btn-start-recording {
      padding: 4px 12px;
      border-radius: 6px;
      background: #6366f1;
      color: #fff;
      font-size: 0.75rem;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: background 0.15s;
    }
    #btn-start-recording:hover { background: #4f46e5; }
    #btn-start-recording:disabled { opacity: 0.4; cursor: not-allowed; }

  </style>
</head>
<body class="min-h-screen flex flex-col">

  <!-- Header -->
  <header class="sticky top-0 z-10 flex items-center justify-between px-6 py-3 border-b border-white/[0.06] bg-[#13131a]">
    <div class="flex items-center gap-3">
      <svg class="w-5 h-5 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4M9 11V5a3 3 0 116 0v6"/>
      </svg>
      <span class="font-semibold text-sm tracking-wide text-white/80">Live STT</span>
    </div>

    <div class="flex items-center gap-4">
      <!-- QR code thumbnail (hidden if SITE_URL not set) -->
      <img id="qr-thumb" src="/qr.png" width="32" height="32"
           class="rounded cursor-pointer hidden" title="Scan to view on your phone" />

      <!-- Connection / Deepgram status indicator -->
      <div id="status-badge" class="flex items-center gap-2 text-xs font-medium">
        <span id="status-dot" class="dot-pulse bg-yellow-400"></span>
        <span id="status-text" class="text-white/50">Connecting…</span>
      </div>

      <!-- Font size controls -->
      <div class="flex items-center gap-1">
        <button id="btn-font-down"
                class="text-xs px-2 py-1.5 rounded-md border border-white/10 text-white/40
                       hover:text-white/70 hover:border-white/20 transition-colors font-bold">
          A-
        </button>
        <button id="btn-font-up"
                class="text-xs px-2 py-1.5 rounded-md border border-white/10 text-white/40
                       hover:text-white/70 hover:border-white/20 transition-colors font-bold">
          A+
        </button>
      </div>

      <!-- Controls -->
    </div>
  </header>

  <!-- Session status bar -->
  <div id="session-bar">
    <span id="session-dot" style="background:#6b7280;"></span>
    <span id="session-state-text" class="text-white/40 font-medium uppercase tracking-wide">IDLE</span>
    <span id="session-details" class="text-white/30" style="display:none;"></span>

    <!-- Start button (shown in IDLE) -->
    <button id="btn-start-recording">Start Transcription</button>
    <span id="start-form-msg" class="text-[0.7rem] text-red-400"></span>
  </div>

  <!-- Transcript area -->
  <main class="flex-1 overflow-hidden flex flex-col px-6 py-4 max-w-4xl w-full mx-auto">
    <div id="transcript-container"
         class="flex-1 overflow-y-auto space-y-1 pr-1 pb-4">
      <!-- Lines inserted here by JS -->
    </div>
  </main>

  <!-- QR overlay -->
  <div id="qr-overlay" class="fixed inset-0 bg-black/70 flex items-center justify-center hidden z-50">
    <div class="bg-white p-4 rounded-lg" onclick="event.stopPropagation()">
      <img src="/qr.png" width="200" height="200" />
    </div>
  </div>

  <script src="/static/shared.js"></script>
  <script>
    // Redirect to admin setup if first-run
    (async () => {
      try {
        const resp = await fetch('/setup/status');
        const data = await resp.json();
        if (data.needs_setup) { window.location.href = '/admin'; return; }
      } catch { /* ignore */ }
    })();

    // ── Elements ──────────────────────────────────────────────────────────
    const container        = document.getElementById('transcript-container');
    const statusDot        = document.getElementById('status-dot');
    const statusText       = document.getElementById('status-text');

    // Session bar elements
    const sessionDot       = document.getElementById('session-dot');
    const sessionStateText = document.getElementById('session-state-text');
    const sessionDetails   = document.getElementById('session-details');
    const btnStartRec      = document.getElementById('btn-start-recording');
    const startFormMsg     = document.getElementById('start-form-msg');

    // ── Font size controls ───────────────────────────────────────────────
    const FONT_MIN = 12, FONT_MAX = 24, FONT_STEP = 2, FONT_KEY = 'livestt-font-size';

    function applyFontSize(px) {
      document.documentElement.style.setProperty('--transcript-font-size', px + 'px');
      localStorage.setItem(FONT_KEY, px);
    }

    // Apply saved size immediately
    applyFontSize(parseInt(localStorage.getItem(FONT_KEY)) || 14);

    function currentFontSize() {
      return parseInt(getComputedStyle(document.documentElement)
        .getPropertyValue('--transcript-font-size')) || 14;
    }

    document.getElementById('btn-font-down').addEventListener('click', () => {
      const cur = currentFontSize();
      if (cur > FONT_MIN) applyFontSize(cur - FONT_STEP);
    });

    document.getElementById('btn-font-up').addEventListener('click', () => {
      const cur = currentFontSize();
      if (cur < FONT_MAX) applyFontSize(cur + FONT_STEP);
    });

    // ── Session state ────────────────────────────────────────────────────
    let sessionStartedAt = null;
    let elapsedTimer = null;

    function formatTimeHHMM(isoStr) {
      try {
        return new Date(isoStr).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      } catch { return ''; }
    }

    function formatElapsed(startedAt) {
      const secs = Math.floor((Date.now() - new Date(startedAt).getTime()) / 1000);
      const h = Math.floor(secs / 3600);
      const m = Math.floor((secs % 3600) / 60);
      const s = secs % 60;
      return [h, m, s].map(v => String(v).padStart(2, '0')).join(':');
    }

    function updateElapsed() {
      if (!sessionStartedAt) return;
      const el = document.getElementById('session-elapsed');
      if (el) el.textContent = `(${formatElapsed(sessionStartedAt)})`;
    }

    function applySessionStatus(payload) {
      const state = payload.state || 'idle';

      if (elapsedTimer) { clearInterval(elapsedTimer); elapsedTimer = null; }

      if (state === 'active') {
        sessionStartedAt = payload.started_at || null;
        sessionDot.style.background = '#22c55e';
        sessionStateText.textContent = 'RECORDING';
        sessionStateText.style.color = '#22c55e';

        let details = formatTimeHHMM(payload.started_at);
        if (sessionStartedAt) {
          details += ` &nbsp;<span id="session-elapsed">(${formatElapsed(sessionStartedAt)})</span>`;
        }
        if (payload.label) details += ` &nbsp;"${payload.label}"`;
        sessionDetails.innerHTML = details;
        sessionDetails.style.display = '';

        btnStartRec.style.display = 'none';

        elapsedTimer = setInterval(updateElapsed, 1000);
      } else {
        sessionStartedAt = null;
        sessionDot.style.background = '#6b7280';
        sessionStateText.textContent = 'IDLE';
        sessionStateText.style.color = '';
        sessionDetails.style.display = 'none';
        sessionDetails.innerHTML = '';

        btnStartRec.style.display = '';
        btnStartRec.disabled = false;
      }
    }

    // ── Start transcription ─────────────────────────────────────────────
    btnStartRec.addEventListener('click', async () => {
      btnStartRec.disabled = true;
      startFormMsg.textContent = '';
      try {
        const resp = await fetch('/session/start', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ label: '' }),
        });
        if (resp.status === 409) {
          startFormMsg.textContent = 'Session already active.';
        } else if (!resp.ok) {
          startFormMsg.textContent = `Error ${resp.status}`;
          btnStartRec.disabled = false;
        }
      } catch (err) {
        startFormMsg.textContent = 'Request failed.';
        btnStartRec.disabled = false;
      }
    });

    // ── Fetch initial session status ──────────────────────────────────────
    async function fetchSessionStatus() {
      try {
        const resp = await fetch('/session/status');
        if (resp.ok) applySessionStatus(await resp.json());
      } catch { /* ignore */ }
    }

    // ── Init shared module ───────────────────────────────────────────────

    LiveSTT.init({
      containerEl: container,
      statusDotEl: statusDot,
      statusTextEl: statusText,
      onSessionStatus: applySessionStatus,
      onConnected: fetchSessionStatus,
    });

    // ── QR code ──────────────────────────────────────────────────────────
    (function () {
      const qrThumb = document.getElementById('qr-thumb');
      const qrOverlay = document.getElementById('qr-overlay');
      fetch('/qr.png', { method: 'HEAD' }).then(r => {
        if (r.ok) qrThumb.classList.remove('hidden');
      }).catch(() => {});
      qrThumb.addEventListener('click', () => qrOverlay.classList.remove('hidden'));
      qrOverlay.addEventListener('click', () => qrOverlay.classList.add('hidden'));
    })();
  </script>
</body>
</html>
