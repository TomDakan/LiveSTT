<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Live STT</title>
  <link rel="stylesheet" href="/static/tailwind.css">
  <style>
    :root {
      --accent: #6366f1;
      --accent-dim: #4f46e5;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #0f0f13;
      color: #e2e2e8;
    }

    #transcript-container::-webkit-scrollbar { width: 4px; }
    #transcript-container::-webkit-scrollbar-track { background: transparent; }
    #transcript-container::-webkit-scrollbar-thumb { background: #3f3f50; border-radius: 4px; }

    .line-enter {
      animation: fadeSlideIn 0.25s ease forwards;
    }

    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .speaker-badge {
      display: inline-block;
      padding: 1px 8px;
      border-radius: 999px;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-right: 6px;
      vertical-align: middle;
      opacity: 0.9;
    }

    .dot-pulse {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      animation: pulse 1.4s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.4; transform: scale(0.7); }
    }

    /* Session status bar */
    #session-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 6px 24px;
      background: #0c0c10;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      font-size: 0.75rem;
    }

    #session-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    #btn-start-recording {
      padding: 4px 12px;
      border-radius: 6px;
      background: #6366f1;
      color: #fff;
      font-size: 0.75rem;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: background 0.15s;
    }
    #btn-start-recording:hover { background: #4f46e5; }
    #btn-start-recording:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Start recording inline form */
    #start-form {
      display: none;
      align-items: center;
      gap: 8px;
    }
    #start-form.visible { display: flex; }

    #input-label {
      background: #1a1a24;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 6px;
      color: #e2e2e8;
      font-size: 0.75rem;
      padding: 4px 10px;
      width: 240px;
      outline: none;
    }
    #input-label:focus { border-color: #6366f1; }

    #btn-submit-start {
      padding: 4px 10px;
      border-radius: 6px;
      background: #6366f1;
      color: #fff;
      font-size: 0.75rem;
      font-weight: 600;
      border: none;
      cursor: pointer;
    }
    #btn-submit-start:hover { background: #4f46e5; }

    #btn-cancel-start {
      padding: 4px 8px;
      border-radius: 6px;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.4);
      font-size: 0.75rem;
      cursor: pointer;
    }

    #start-form-msg {
      font-size: 0.7rem;
      color: #f87171;
    }
  </style>
</head>
<body class="min-h-screen flex flex-col">

  <!-- Header -->
  <header class="flex items-center justify-between px-6 py-3 border-b border-white/[0.06] bg-[#13131a]">
    <div class="flex items-center gap-3">
      <svg class="w-5 h-5 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4M9 11V5a3 3 0 116 0v6"/>
      </svg>
      <span class="font-semibold text-sm tracking-wide text-white/80">Live STT</span>
    </div>

    <div class="flex items-center gap-4">
      <!-- Connection / Deepgram status indicator -->
      <div id="status-badge" class="flex items-center gap-2 text-xs font-medium">
        <span id="status-dot" class="dot-pulse bg-yellow-400"></span>
        <span id="status-text" class="text-white/50">Connecting…</span>
      </div>

      <!-- Controls -->
      <button id="btn-clear"
              class="text-xs px-3 py-1.5 rounded-md border border-white/10 text-white/40
                     hover:text-white/70 hover:border-white/20 transition-colors">
        Clear
      </button>
    </div>
  </header>

  <!-- Session status bar -->
  <div id="session-bar">
    <span id="session-dot" style="background:#6b7280;"></span>
    <span id="session-state-text" class="text-white/40 font-medium uppercase tracking-wide">IDLE</span>
    <span id="session-details" class="text-white/30" style="display:none;"></span>

    <!-- Start button (shown in IDLE) -->
    <button id="btn-start-recording">Start Recording</button>

    <!-- Inline label form (shown when button clicked) -->
    <div id="start-form">
      <input id="input-label" type="text" placeholder="e.g. Sunday Morning Service" maxlength="80" />
      <button id="btn-submit-start">Start</button>
      <button id="btn-cancel-start">Cancel</button>
      <span id="start-form-msg"></span>
    </div>
  </div>

  <!-- Transcript area -->
  <main class="flex-1 overflow-hidden flex flex-col px-6 py-4 max-w-4xl w-full mx-auto">
    <div id="transcript-container"
         class="flex-1 overflow-y-auto space-y-1 pr-1 pb-4">
      <!-- Lines inserted here by JS -->
    </div>

    <!-- Interim line -->
    <div id="interim-row" class="min-h-[2rem] flex items-start gap-2 pt-2 border-t border-white/[0.05]">
      <span id="interim-text" class="text-sm italic text-white/35 leading-relaxed"></span>
    </div>
  </main>

  <script>
    // ── Config ────────────────────────────────────────────────────────────────
    const WS_URL = `ws://${window.location.host}/ws/transcripts`;
    const RECONNECT_MS = 3000;

    // ── State ─────────────────────────────────────────────────────────────────
    let ws = null;
    let reconnectTimer = null;
    let backfillRendered = false;
    let separatorInserted = false;
    let sessionStartedAt = null;
    let elapsedTimer = null;
    let dgState = 'ok';  // 'ok' | 'reconnecting'

    const container        = document.getElementById('transcript-container');
    const interimText      = document.getElementById('interim-text');
    const statusDot        = document.getElementById('status-dot');
    const statusText       = document.getElementById('status-text');
    const btnClear         = document.getElementById('btn-clear');

    // Session bar elements
    const sessionDot       = document.getElementById('session-dot');
    const sessionStateText = document.getElementById('session-state-text');
    const sessionDetails   = document.getElementById('session-details');
    const btnStartRec      = document.getElementById('btn-start-recording');
    const startForm        = document.getElementById('start-form');
    const inputLabel       = document.getElementById('input-label');
    const btnSubmitStart   = document.getElementById('btn-submit-start');
    const btnCancelStart   = document.getElementById('btn-cancel-start');
    const startFormMsg     = document.getElementById('start-form-msg');

    // ── Speaker colours ───────────────────────────────────────────────────────
    const SPEAKER_PALETTE = [
      ['#6366f1', '#1e1b4b'],
      ['#10b981', '#064e3b'],
      ['#f59e0b', '#451a03'],
      ['#ec4899', '#500724'],
      ['#06b6d4', '#082f49'],
      ['#a855f7', '#2e1065'],
      ['#f97316', '#431407'],
    ];

    function speakerColour(name) {
      if (!name || name === 'Unknown') return null;
      let hash = 0;
      for (let i = 0; i < name.length; i++) hash = (hash * 31 + name.charCodeAt(i)) | 0;
      return SPEAKER_PALETTE[Math.abs(hash) % SPEAKER_PALETTE.length];
    }

    // ── Connection status ─────────────────────────────────────────────────────
    function setWsStatus(state) {
      // state: 'connecting' | 'live' | 'offline'
      if (state === 'connecting') {
        statusDot.className  = 'dot-pulse bg-yellow-400';
        statusDot.style.animation = '';
        statusText.textContent = 'Connecting…';
      } else if (state === 'offline') {
        statusDot.className  = 'dot-pulse bg-red-500';
        statusDot.style.animation = 'none';
        statusText.textContent = 'Disconnected';
      } else {
        // WebSocket connected; final label driven by dgState
        applyDgStatus();
      }
    }

    function applyDgStatus() {
      if (dgState === 'reconnecting') {
        statusDot.className  = 'dot-pulse bg-amber-400';
        statusDot.style.animation = '';
        statusText.textContent = 'Reconnecting…';
      } else {
        statusDot.className  = 'dot-pulse bg-green-400';
        statusDot.style.animation = 'none';
        statusText.textContent = 'Live';
      }
    }

    // ── Session status bar ────────────────────────────────────────────────────
    function formatTimeHHMM(isoStr) {
      try {
        return new Date(isoStr).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      } catch { return ''; }
    }

    function formatElapsed(startedAt) {
      const secs = Math.floor((Date.now() - new Date(startedAt).getTime()) / 1000);
      const h = Math.floor(secs / 3600);
      const m = Math.floor((secs % 3600) / 60);
      const s = secs % 60;
      return [h, m, s].map(v => String(v).padStart(2, '0')).join(':');
    }

    function updateElapsed() {
      if (!sessionStartedAt) return;
      const el = document.getElementById('session-elapsed');
      if (el) el.textContent = `(${formatElapsed(sessionStartedAt)})`;
    }

    function applySessionStatus(payload) {
      const state = payload.state || 'idle';

      if (elapsedTimer) { clearInterval(elapsedTimer); elapsedTimer = null; }

      if (state === 'active') {
        sessionStartedAt = payload.started_at || null;
        sessionDot.style.background = '#22c55e';
        sessionStateText.textContent = 'RECORDING';
        sessionStateText.style.color = '#22c55e';

        let details = formatTimeHHMM(payload.started_at);
        if (sessionStartedAt) {
          details += ` &nbsp;<span id="session-elapsed">(${formatElapsed(sessionStartedAt)})</span>`;
        }
        if (payload.label) details += ` &nbsp;"${payload.label}"`;
        sessionDetails.innerHTML = details;
        sessionDetails.style.display = '';

        btnStartRec.style.display = 'none';
        startForm.classList.remove('visible');

        elapsedTimer = setInterval(updateElapsed, 1000);
      } else {
        sessionStartedAt = null;
        sessionDot.style.background = '#6b7280';
        sessionStateText.textContent = 'IDLE';
        sessionStateText.style.color = '';
        sessionDetails.style.display = 'none';
        sessionDetails.innerHTML = '';

        btnStartRec.style.display = '';
        btnStartRec.disabled = false;
      }
    }

    // ── DOM helpers ───────────────────────────────────────────────────────────
    function formatTime(isoStr) {
      try {
        const d = isoStr ? new Date(isoStr) : new Date();
        return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
      } catch { return ''; }
    }

    function appendFinalLine(text, speaker, timestamp, isBackfill) {
      if (!text.trim()) return;

      const row = document.createElement('div');
      row.className = 'line-enter flex items-start gap-2 py-0.5';

      const ts = document.createElement('span');
      ts.className = 'text-xs text-white/20 tabular-nums mt-0.5 shrink-0 w-16';
      ts.textContent = isBackfill ? '[PRE-ROLL]' : formatTime(timestamp);
      row.appendChild(ts);

      const body = document.createElement('span');
      body.className = isBackfill
        ? 'text-sm text-white/40 leading-relaxed'
        : 'text-sm text-white/85 leading-relaxed';

      const colours = speakerColour(speaker);
      if (colours) {
        const badge = document.createElement('span');
        badge.className = 'speaker-badge';
        badge.style.color = colours[0];
        badge.style.background = colours[1];
        badge.style.border = `1px solid ${colours[0]}44`;
        badge.textContent = speaker;
        body.appendChild(badge);
      }

      body.appendChild(document.createTextNode(text));
      row.appendChild(body);
      container.appendChild(row);

      container.scrollTop = container.scrollHeight;
    }

    function setInterim(text) {
      interimText.textContent = text || '';
    }

    function clearTranscript() {
      container.innerHTML = '';
      setInterim('');
      backfillRendered = false;
      separatorInserted = false;
    }

    // ── Start recording form ──────────────────────────────────────────────────
    btnStartRec.addEventListener('click', () => {
      startForm.classList.add('visible');
      btnStartRec.style.display = 'none';
      startFormMsg.textContent = '';
      inputLabel.value = '';
      inputLabel.focus();
    });

    btnCancelStart.addEventListener('click', () => {
      startForm.classList.remove('visible');
      btnStartRec.style.display = '';
    });

    async function submitStartSession() {
      btnSubmitStart.disabled = true;
      startFormMsg.textContent = '';
      const label = inputLabel.value.trim();
      try {
        const resp = await fetch('/session/start', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ label }),
        });
        if (resp.status === 409) {
          startFormMsg.textContent = 'Session already active.';
          startForm.classList.remove('visible');
          btnStartRec.style.display = '';
        } else if (!resp.ok) {
          startFormMsg.textContent = `Error ${resp.status}`;
        }
        // On 200, session_status WebSocket message will update the UI
      } catch (err) {
        startFormMsg.textContent = 'Request failed.';
      } finally {
        btnSubmitStart.disabled = false;
      }
    }

    btnSubmitStart.addEventListener('click', submitStartSession);
    inputLabel.addEventListener('keydown', e => {
      if (e.key === 'Enter') submitStartSession();
      if (e.key === 'Escape') btnCancelStart.click();
    });

    // ── Fetch initial session status ──────────────────────────────────────────
    async function fetchSessionStatus() {
      try {
        const resp = await fetch('/session/status');
        if (resp.ok) applySessionStatus(await resp.json());
      } catch { /* ignore */ }
    }

    // ── WebSocket ─────────────────────────────────────────────────────────────
    function connect() {
      if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
      setWsStatus('connecting');

      ws = new WebSocket(WS_URL);

      ws.onopen = () => {
        setWsStatus('live');
        fetchSessionStatus();
      };

      ws.onmessage = (event) => {
        let msg;
        try { msg = JSON.parse(event.data); } catch { return; }

        if (msg.type === 'transcript') {
          const p = msg.payload || {};
          const isBackfill = p.source === 'backfill';
          const isLive     = !p.source || p.source === 'live';
          if (!isBackfill && !isLive) return;

          const text    = (p.text || '').trim();
          const speaker = p.speaker || null;
          const ts      = p.timestamp || null;

          if (p.is_final) {
            if (isLive && backfillRendered && !separatorInserted) {
              separatorInserted = true;
              const sep = document.createElement('div');
              sep.className = 'my-2 border-t border-white/10';
              container.appendChild(sep);
            }
            setInterim('');
            appendFinalLine(text, speaker, ts, isBackfill);
            if (isBackfill) backfillRendered = true;
          } else if (isLive) {
            setInterim(text);
          }
          return;
        }

        if (msg.type === 'session_status') {
          applySessionStatus(msg.payload || {});
          return;
        }

        if (msg.type === 'stt_status') {
          const state = (msg.payload || {}).state;
          dgState = (state === 'reconnecting') ? 'reconnecting' : 'ok';
          applyDgStatus();
          return;
        }
      };

      ws.onclose = () => {
        setWsStatus('offline');
        reconnectTimer = setTimeout(connect, RECONNECT_MS);
      };

      ws.onerror = () => {
        ws.close();
      };
    }

    // ── Init ──────────────────────────────────────────────────────────────────
    btnClear.addEventListener('click', clearTranscript);
    connect();
  </script>
</body>
</html>
