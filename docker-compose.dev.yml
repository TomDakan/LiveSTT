# Local development overrides — relaxed health timeouts and mounted source dirs.
#
# Applied automatically by `just up-dev`. To use manually:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d
#
# Tip: copy this file to docker-compose.override.yml (git-ignored) if you want
# Docker Compose to apply it automatically on every `docker compose up`.
services:
  nats:
    healthcheck:
      interval: 5s
      start_period: 2s

  api-gateway:
    healthcheck:
      interval: 5s
      start_period: 5s
    volumes:
      # Mount Python source and individual static files for live reload.
      # tailwind.css is built at image time and NOT mounted — the image
      # copy is used at runtime so the compiled stylesheet is preserved.
      - ./services/api-gateway/src/api_gateway/main.py:/app/services/api-gateway/src/api_gateway/main.py
      - ./services/api-gateway/src/api_gateway/auth.py:/app/services/api-gateway/src/api_gateway/auth.py
      - ./services/api-gateway/src/api_gateway/db.py:/app/services/api-gateway/src/api_gateway/db.py
      - ./services/api-gateway/src/api_gateway/export.py:/app/services/api-gateway/src/api_gateway/export.py
      - ./services/api-gateway/src/api_gateway/status.py:/app/services/api-gateway/src/api_gateway/status.py
      - ./services/api-gateway/src/api_gateway/static/index.html:/app/services/api-gateway/src/api_gateway/static/index.html
      - ./services/api-gateway/src/api_gateway/static/admin.html:/app/services/api-gateway/src/api_gateway/static/admin.html
      - ./services/api-gateway/src/api_gateway/static/display.html:/app/services/api-gateway/src/api_gateway/static/display.html
      - ./services/api-gateway/src/api_gateway/static/shared.js:/app/services/api-gateway/src/api_gateway/static/shared.js
      - ./libs/messaging/src:/app/libs/messaging/src

  audio-producer:
    healthcheck:
      interval: 5s
      start_period: 5s
    volumes:
      - ./services/audio-producer/src:/app/services/audio-producer/src
      - ./libs/messaging/src:/app/libs/messaging/src

  stt-provider:
    healthcheck:
      interval: 5s
      start_period: 5s
    volumes:
      - ./services/stt-provider/src:/app/services/stt-provider/src
      - ./libs/messaging/src:/app/libs/messaging/src

  system-manager:
    healthcheck:
      interval: 5s
      start_period: 5s
    volumes:
      - ./services/system-manager/src:/app/services/system-manager/src
      - ./libs/messaging/src:/app/libs/messaging/src

  identity-manager:
    healthcheck:
      interval: 5s
      start_period: 5s
    volumes:
      - ./services/identity-manager/src:/app/services/identity-manager/src
      - ./libs/messaging/src:/app/libs/messaging/src
