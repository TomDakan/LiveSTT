services:
  nats:
    image: nats:2.10-alpine
    container_name: nats
    command: "-js -sd /data/nats -m 8222"
    restart: always
    healthcheck:
      test: ["CMD", "nats-server", "--health"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    volumes:
      - nats_data:/data/nats
    networks:
      - internal_overlay

  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    container_name: api-gateway
    restart: always
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    ports:
      - "8000:8000"
    environment:
      - NATS_URL=nats://nats:4222
      - ADMIN_PASSWORD_HASH=${ADMIN_PASSWORD_HASH:-}
      - SITE_URL=${SITE_URL:-}
      - NATS_LOG_FORWARDING=true
    volumes:
      - db_data:/data/db
    networks:
      - internal_overlay
    depends_on:
      nats:
        condition: service_healthy

  audio-producer:
    build:
      context: .
      dockerfile: services/audio-producer/Dockerfile
    container_name: audio-producer
    restart: always
    healthcheck:
      test: ["CMD", "test", "-f", "/tmp/healthy"]
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 15s
    environment:
      - NATS_URL=nats://nats:4222
      - AUDIO_FILE=${AUDIO_FILE:-}   # Leave blank to use live mic (ALSA)
      - NATS_LOG_FORWARDING=true
    volumes:
      - ./tests/data:/data
    # --- USB/ALSA Passthrough (for dev E2E testing on Windows/WSL2) ---
    # Requires: usbipd attach --wsl --busid <BUSID> before running
    devices:
      - /dev/snd:/dev/snd
    group_add:
      - audio
    networks:
      - internal_overlay
    depends_on:
      nats:
        condition: service_healthy

  stt-provider:
    build:
      context: .
      dockerfile: services/stt-provider/Dockerfile
    container_name: stt-provider
    restart: always
    healthcheck:
      test: ["CMD", "test", "-f", "/tmp/healthy"]
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 15s
    environment:
      - NATS_URL=nats://nats:4222
      - DEEPGRAM_API_KEY=${DEEPGRAM_API_KEY}
      - NATS_LOG_FORWARDING=true
    networks:
      - internal_overlay
    depends_on:
      nats:
        condition: service_healthy

#   identifier:
#     build:
#       context: .
#       dockerfile: services/identifier/Dockerfile
#     container_name: identifier
#     environment:
#       - NATS_URL=nats://nats:4222
#     volumes:
#       - lancedb_data:/data/lancedb
#     networks:
#       - internal_overlay
#     depends_on:
#       nats:
#         condition: service_healthy

  system-manager:
    build:
      context: .
      dockerfile: services/system-manager/Dockerfile
    container_name: system-manager
    restart: always
    healthcheck:
      test: ["CMD", "test", "-f", "/tmp/healthy"]
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 15s
    environment:
      - NATS_URL=nats://nats:4222
      - API_GATEWAY_URL=http://api-gateway:8000
      - SITE_TIMEZONE=${SITE_TIMEZONE:-UTC}
      - NATS_LOG_FORWARDING=true
    networks:
      - internal_overlay
    depends_on:
      nats:
        condition: service_healthy
      api-gateway:
        condition: service_healthy

  identity-manager:
    build:
      context: .
      dockerfile: services/identity-manager/Dockerfile
    container_name: identity-manager
    restart: always
    healthcheck:
      test: ["CMD", "test", "-f", "/tmp/healthy"]
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 15s
    environment:
      - NATS_URL=nats://nats:4222
      - NATS_LOG_FORWARDING=true
    networks:
      - internal_overlay
    depends_on:
      nats:
        condition: service_healthy

volumes:
  nats_data:
  db_data:

networks:
  internal_overlay:
    driver: bridge
